rules:

  # ======================================================
  # OBJECT-LEVEL AUTHORIZATION (OLA/BOLA)
  # ======================================================

  # 1. OLA/BOLA Authorization Implemented
  - id: ownership-validation-implemented

    paths:
      include:
        - app/api/attempts/\[id\]/**

    pattern-either:

      - pattern: |
          if (!isOwner && !isCompany && !isPsikolog) {
            ...
          }

      - pattern: |
          return NextResponse.json(
            { error: "Forbidden" },
            { status: 403 }
          )

    message: >
      Ownership and authorization validation implemented
      in attempts endpoint.

    severity: INFO

    languages:
      - typescript



  # ======================================================
  # ROLE-BASED AUTHORIZATION
  # ======================================================

  # 2. Role Validation Implemented
  - id: role-validation-implemented

    paths:
      include:
        - app/api/reports/validate/**

    pattern-either:

      - pattern: |
          if ($ROLE === "PSIKOLOG") {
            ...
          }

      - pattern: |
          if ($ROLE !== "PSIKOLOG") {
            ...
          }

    message: >
      Role-based authorization detected
      in validate endpoint.

    severity: INFO

    languages:
      - typescript


  # ======================================================
  # UPDATE AUTHORIZATION
  # ======================================================

  - id: update-summary-authorization-implemented

    paths:
      include:
        - app/api/reports/update-summary/**

    pattern-either:

      - pattern: |
          if ($ROLE === "PSIKOLOG") {
            ...
          }

      - pattern: |
          if ($ROLE !== "PSIKOLOG") {
            ...
          }

      - pattern: |
          if (!isPsikolog) {
            ...
          }

      - pattern: |
          return NextResponse.json(
            { error: "Forbidden" },
            { status: 403 }
          )

    message: >
      Authorization validation implemented
      in update-summary endpoint.

    severity: INFO

    languages:
      - typescript


  # ======================================================
  # DIGITAL SIGNATURE - ED25519
  # ======================================================

  # 4. ED25519 Signature Generation Implemented
  - id: ed25519-signature-implemented

    paths:
      include:
        - app/api/reports/validate/**

    pattern: |
      nacl.sign.detached(
        ...,
        ...
      )

    message: >
      ED25519 digital signature generation implemented
      in validate endpoint.

    severity: INFO

    languages:
      - typescript



  # ======================================================
  # SIGNATURE VERIFICATION
  # ======================================================

  # 5. ED25519 Verification Implemented
  - id: ed25519-verification-implemented

    paths:
      include:
        - app/api/report/verify-file/**
        - app/api/report/view/\[barcode\]/**

    pattern: |
      nacl.sign.detached.verify(
        ...,
        ...,
        ...
      )

    message: >
      ED25519 signature verification implemented.

    severity: INFO

    languages:
      - typescript



  # ======================================================
  # HASH VALIDATION
  # ======================================================

  # 6. Hash Validation Implemented
  - id: hash-validation-implemented

    paths:
      include:
        - app/api/report/verify-file/**
        - app/api/report/view/\[barcode\]/**

    pattern: |
      crypto.createHash(
        ...
      )

    message: >
      Hash validation detected before
      signature verification.

    severity: INFO

    languages:
      - typescript

