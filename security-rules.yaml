rules:

  # ======================================================
  # OBJECT-LEVEL AUTHORIZATION (OLA)
  # ======================================================

  # 1. OLA - Ownership Check Missing
  - id: possible-idor-attempts
    paths:
      include:
        - app/api/attempts/\[id\]/**
    patterns:
      - pattern-either:
          - pattern: |
              await prisma.$MODEL.findUnique({
                where: { id: $ID },
                ...
              })
          - pattern: |
              await prisma.$MODEL.findFirst({
                where: { id: $ID },
                ...
              })
    message: >
      Potential IDOR/BOLA: data accessed by ID without ownership validation
      in attempts endpoint.
    severity: WARNING
    languages: [typescript]

  # 2. OLA - Information Disclosure
  - id: possible-information-disclosure-attempts
    paths:
      include:
        - app/api/attempts/\[id\]/**
    patterns:
      - pattern-either:
          - pattern: |
              await prisma.$MODEL.findUnique({
                where: { id: $ID },
                ...
              })
          - pattern: |
              await prisma.$MODEL.findFirst({
                where: { id: $ID },
                ...
              })
      - pattern-not-inside: |
          if ($OWNER === $USERID)
    message: >
      Potential information disclosure: query does not validate
      ownership/user relation.
    severity: WARNING
    languages: [typescript]

  # 3. OLA - Missing Role Check
  - id: possible-missing-role-check
    paths:
      include:
        - app/api/reports/validate/**
    patterns:
      - pattern: |
          export async function $FUNC(...) {
            ...
          }
      - pattern-not-inside: |
          if ($ROLE === ...)
    message: >
      Potential missing role-based authorization in validate endpoint.
    severity: WARNING
    languages: [typescript]

  # 4. OLA - Missing Ownership/Role Check in update-summary
  - id: possible-unauthorized-update-summary
    paths:
      include:
        - app/api/reports/update-summary/**
    patterns:
      - pattern: |
          await prisma.$MODEL.update({
            where: { id: $ID },
            ...
          })
      - pattern-not-inside: |
          if ($ROLE === ...)
      - pattern-not-inside: |
          if ($OWNER === $USERID)
    message: >
      Potential OLA/BOLA: update-summary endpoint updates report
      without ownership or role validation.
    severity: WARNING
    languages: [typescript]

  # ======================================================
  # DIGITAL SIGNATURE - ED25519
  # ======================================================

  # 5. Missing Digital Signature
  - id: possible-missing-signature-validate
    paths:
      include:
        - app/api/reports/validate/**
    patterns:
      - pattern: |
          export async function $FUNC(...) {
            ...
          }
      - pattern-not: |
          nacl.sign.detached(...)
    message: >
      No ED25519 digital signature detected in validate endpoint.
    severity: WARNING
    languages: [typescript]

  # 6. Missing Signature Verification
  - id: missing-signature-verification
    paths:
      include:
        - app/api/report/verify-file/**
    patterns:
      - pattern: |
          export async function $FUNC(...) {
            ...
          }
      - pattern-not: |
          nacl.sign.detached.verify(...)
    message: >
      No ED25519 signature verification detected in verify endpoint.
    severity: WARNING
    languages: [typescript]

  # 7. Missing Hash Validation
  - id: missing-hash-validation
    paths:
      include:
        - app/api/report/verify-file/**
    patterns:
      - pattern: |
          export async function $FUNC(...) {
            ...
          }
      - pattern-not: |
          crypto.createHash(...)
    message: >
      No hash validation detected before signature verification.
    severity: INFO
    languages: [typescript]

  # 8. Missing ED25519 Verification in View Barcode Endpoint
  - id: missing-signature-verification-view-barcode
    paths:
      include:
        - app/api/report/view/\[barcode\]/**

    patterns:
      - pattern-inside: |
          export async function $FUNC(...) {
            ...
          }

      - pattern-not-inside: |
          verifySignature(...)

    message: >
      No ED25519 signature verification detected
      in report view barcode endpoint.

    severity: WARNING
    languages: [typescript]

  # 9. Missing Hash Validation in View Barcode Endpoint
  - id: missing-hash-validation-view-barcode
    paths:
      include:
        - app/api/report/view/\[barcode\]/**

    patterns:
      - pattern-inside: |
          export async function $FUNC(...) {
            ...
          }

      - pattern-not-inside: |
          crypto.createHash(...)

    message: >
      No hash validation detected before signature verification
      in report view barcode endpoint.

    severity: INFO
    languages: [typescript]